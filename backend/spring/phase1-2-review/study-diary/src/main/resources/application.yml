# 공통 설정
spring:
  application:
    name: study-diary

  # 프로필 설정 — 기본은 dev
  profiles:
    active: dev

  # 파일 업로드 설정 (14번 주제)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # 날짜 포맷 (JSON 응답에서 LocalDateTime 형식)
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Swagger 설정 (15번 주제)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.example.studydiary